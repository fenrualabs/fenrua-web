name: Sync kernel telemetry

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      kernel_ref:
        description: Full 40-character kernel main commit to synchronize
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [kernel-evidence-updated]

permissions:
  contents: read

concurrency:
  group: kernel-telemetry-sync-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify kernel evidence without write authority
    runs-on: ubuntu-latest
    outputs:
      base_sha: ${{ steps.site-base.outputs.sha }}
      changed: ${{ steps.patch.outputs.changed }}
      patch_bytes: ${{ steps.patch.outputs.bytes }}
      patch_sha256: ${{ steps.patch.outputs.sha256 }}
    timeout-minutes: 25
    steps:
      - name: Check out public site source without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Record immutable site base
        id: site-base
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve authorized kernel revision
        id: kernel-ref
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_REF: ${{ inputs.kernel_ref || github.event.client_payload.ref || '' }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            ref="main"
          else
            ref="$REQUESTED_REF"
            if [[ ! "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Manual and dispatch synchronization require a full lowercase commit SHA." >&2
              exit 1
            fi
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Check out kernel evidence snapshot without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: fenrualabs/fenrua-kernel
          ref: ${{ steps.kernel-ref.outputs.ref }}
          path: .kernel-source
          fetch-depth: 0
          persist-credentials: false

      - name: Require the current kernel main head
        shell: bash
        run: |
          git -C .kernel-source fetch --quiet --no-tags origin main:refs/remotes/origin/main
          selected="$(git -C .kernel-source rev-parse HEAD)"
          protected_head="$(git -C .kernel-source rev-parse refs/remotes/origin/main)"
          if [[ "$selected" != "$protected_head" ]]; then
            echo "Selected kernel revision is not the current main head." >&2
            exit 1
          fi

      - name: Set up exact release Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0

      - name: Set up exact release npm
        run: |
          npm install --global --ignore-scripts npm@11.18.0
          npm --version

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Generate only validated public telemetry
        run: node scripts/sync-kernel-status.mjs --kernel-dir .kernel-source

      - name: Remove the nested source checkout
        run: rm -rf .kernel-source

      - name: Regenerate derived public evidence routes
        run: npm run generate:static

      - name: Validate the generated static surface
        run: npm run validate

      - name: Export a bounded verified patch
        id: patch
        shell: bash
        run: |
          git add --all
          if git diff --cached --quiet; then
            {
              echo "changed=false"
              echo "bytes=0"
              echo "sha256="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --cached --name-only --diff-filter=D | grep -q .; then
            echo "Telemetry synchronization may not delete files." >&2
            exit 1
          fi
          while IFS= read -r -d '' changed_path; do
            case "$changed_path" in
              kernel-status.js|evidence/index.html|research/index.html|research/pn521-cross-limb-borrow/index.html|research/toolchain-evidence-lock/index.html|research/read-only-chain-observation/index.html)
                ;;
              *)
                echo "Telemetry synchronization attempted to change a non-allowlisted path: $changed_path" >&2
                exit 1
                ;;
            esac
          done < <(git diff --cached --name-only -z)
          git diff --cached --binary | gzip -9 > /tmp/kernel-telemetry.patch.gz
          patch_bytes="$(stat --format='%s' /tmp/kernel-telemetry.patch.gz)"
          if (( patch_bytes > 262144 )); then
            echo "Verified telemetry patch exceeds the 256 KiB compressed limit." >&2
            exit 1
          fi
          {
            echo "changed=true"
            echo "bytes=$patch_bytes"
            echo "sha256=$(sha256sum /tmp/kernel-telemetry.patch.gz | cut -d ' ' -f 1)"
          } >> "$GITHUB_OUTPUT"

      - name: Transfer the verified patch as a short-lived artifact
        if: steps.patch.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kernel-telemetry-patch-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/kernel-telemetry.patch.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Revalidate and stage verified telemetry update
    needs: verify
    if: needs.verify.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Check out unchanged site base without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Reject a moved site base
        shell: bash
        env:
          EXPECTED_BASE: ${{ needs.verify.outputs.base_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_BASE"

      - name: Download the short-lived verified patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kernel-telemetry-patch-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/verified-telemetry

      - name: Apply the verified patch
        shell: bash
        env:
          EXPECTED_PATCH_BYTES: ${{ needs.verify.outputs.patch_bytes }}
          EXPECTED_PATCH_SHA256: ${{ needs.verify.outputs.patch_sha256 }}
        run: |
          artifact=/tmp/verified-telemetry/kernel-telemetry.patch.gz
          test -f "$artifact"
          test ! -L "$artifact"
          test "$(find /tmp/verified-telemetry -mindepth 1 | wc -l)" -eq 1
          test "$(stat --format='%s' "$artifact")" = "$EXPECTED_PATCH_BYTES"
          test "$(sha256sum "$artifact" | cut -d ' ' -f 1)" = "$EXPECTED_PATCH_SHA256"
          set +e
          gzip --decompress --stdout "$artifact" | head --bytes=2097153 > /tmp/kernel-telemetry.patch
          pipeline_status=("${PIPESTATUS[@]}")
          set -e
          patch_bytes="$(stat --format='%s' /tmp/kernel-telemetry.patch)"
          if (( patch_bytes > 2097152 )); then
            echo "Verified telemetry patch exceeds the 2 MiB expanded limit." >&2
            exit 1
          fi
          if (( pipeline_status[0] != 0 || pipeline_status[1] != 0 )); then
            echo "Verified telemetry patch could not be decompressed completely." >&2
            exit 1
          fi
          git apply --index /tmp/kernel-telemetry.patch

      - name: Set up exact release Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0

      - name: Set up exact release npm
        run: |
          npm install --global --ignore-scripts npm@11.18.0
          npm --version

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Revalidate without repository credentials
        run: |
          npm run validate
          git diff --exit-code

      - name: Commit and stage on the review-only automation branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "fenrua-telemetry-sync[bot]"
          git config user.email "fenrua-telemetry-sync[bot]@users.noreply.github.com"
          git commit -m "chore: sync verified kernel telemetry"
          auth="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          branch=refs/heads/automation/kernel-telemetry-sync
          remote_sha="$(git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $auth" \
            ls-remote --heads origin "$branch" | cut -f 1)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $auth" \
            push --force-with-lease="$branch:$remote_sha" origin "HEAD:$branch"
          {
            echo "### Verified telemetry update staged"
            echo
            echo "The update is on \`automation/kernel-telemetry-sync\`."
            echo "Open or refresh its pull request, require \`Validate public surface\`, and merge only after review."
            echo "The workflow never bypasses protected \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"
