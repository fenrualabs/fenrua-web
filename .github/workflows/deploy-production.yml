name: SAE release gate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type SAE-PUBLISH-fenrua.ai to publish current main.'
        required: true
        type: string
      commit_sha:
        description: 'Optional exact current main SHA to publish. Defaults to the workflow commit.'
        required: false
        type: string
  workflow_run:
    workflows:
      - Site integrity
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: fenrua-production
  cancel-in-progress: false

jobs:
  sae-release-gate:
    name: SAE release gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'SAE-PUBLISH-fenrua.ai')

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SAE_SELECTED_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.commit_sha || github.sha }}

    steps:
      - name: Checkout clean source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ env.SAE_SELECTED_REF }}
          persist-credentials: false

      - name: Verify SAE release target
        shell: bash
        run: |
          set -euo pipefail
          release_sha="$(git rev-parse HEAD)"
          git fetch --force origin main
          main_sha="$(git rev-parse origin/main)"

          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Resolved release SHA is not a 40-character Git commit."
            exit 1
          fi

          if [[ "$release_sha" != "$main_sha" ]]; then
            echo "::error::SAE release gate only publishes the exact current main commit."
            echo "Resolved release SHA: $release_sha"
            echo "Current main SHA: $main_sha"
            exit 1
          fi

          for variable in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::$variable is not configured for the SAE release gate."
              exit 1
            fi
          done

          printf 'SAE_RELEASE_SHA=%s\n' "$release_sha" >> "$GITHUB_ENV"
          echo "SAE release gate locked to $release_sha"

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install pinned publishing tooling
        run: npm install --global npm@11.18.0 vercel@55.0.0

      - name: Install locked dependencies
        run: npm ci

      - name: Install browser matrix for release checks
        run: npm exec --no -- playwright install --with-deps chromium firefox webkit

      - name: Validate SAE release surface
        run: npm run release:check

      - name: Pull Vercel production configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production deployment
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ env.SAE_RELEASE_SHA }}
          VERCEL_GIT_COMMIT_REF: main
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        id: deploy
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ env.SAE_RELEASE_SHA }}
          VERCEL_GIT_COMMIT_REF: main
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tail -n 1)"
          printf 'deployment_url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"
          echo "SAE production deployment completed for $SAE_RELEASE_SHA"

      - name: Verify fenrua.ai release manifest
        shell: bash
        run: |
          set -euo pipefail
          release_url="https://fenrua.ai/.well-known/fenrua-release.json"
          body_file="$RUNNER_TEMP/fenrua-release.json"

          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --location \
              --header "Cache-Control: no-cache" \
              --output "$body_file" \
              "$release_url?sae_release=${SAE_RELEASE_SHA}&attempt=${attempt}"; then
              if node - "$body_file" "$SAE_RELEASE_SHA" <<'NODE'
const fs = require('node:fs');
const file = process.argv[2];
const expected = process.argv[3];
const manifest = JSON.parse(fs.readFileSync(file, 'utf8'));
if (manifest?.record?.release?.sourceCommit !== expected) process.exit(1);
NODE
              then
                echo "fenrua.ai release manifest is live for $SAE_RELEASE_SHA"
                exit 0
              fi
            fi
            sleep 15
          done

          echo "::error::fenrua.ai did not expose the expected release manifest for $SAE_RELEASE_SHA."
          exit 1

      - name: Publish SAE release summary
        if: always()
        run: |
          {
            echo "### SAE release gate"
            echo "- Release SHA: \`${SAE_RELEASE_SHA:-unresolved}\`"
            echo "- Deployment URL: \`${{ steps.deploy.outputs.deployment_url || 'not completed' }}\`"
            echo "- Canonical domain: https://fenrua.ai"
          } >> "$GITHUB_STEP_SUMMARY"
