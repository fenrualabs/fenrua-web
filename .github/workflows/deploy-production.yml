name: Deploy production Node 24

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fenrua-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout clean source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install pinned tooling
        run: npm install --global npm@11.18.0 vercel@55.0.0

      - name: Install dependencies
        run: npm ci

      - name: Validate production release
        run: npm run release:production-check

      - name: Pull Vercel production configuration
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production deployment
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
