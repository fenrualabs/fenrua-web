name: Retired public production deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Direct production deploy command retired
    runs-on: ubuntu-latest
    steps:
      - name: Refuse public-repo deployment
        run: |
          echo "::error::Production publishing no longer runs from fenrua-web."
          echo "::error::Use the Owner-approved Git-integrated release sequence."
          exit 1
