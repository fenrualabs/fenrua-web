name: Site integrity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate public surface
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install checksum-pinned Gitleaks
        shell: bash
        run: |
          archive="$RUNNER_TEMP/gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Scan the complete public history and worktree for secrets
        shell: bash
        run: |
          git fetch --force --prune --tags origin '+refs/heads/*:refs/remotes/origin/*'
          printf 'reachable_commits=%s\n' "$(git rev-list --all --count)"
          printf 'gitleaks_version=%s\n' "$(gitleaks version)"
          printf 'allowlist_sha256=' && sha256sum .gitleaksignore | cut --delimiter=' ' --fields=1
          gitleaks git . --log-opts=--all --no-banner --no-color --redact=100
          gitleaks dir . --no-banner --no-color --redact=100

      - name: Set up exact release Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0

      - name: Set up exact release npm
        run: |
          npm install --global --ignore-scripts npm@11.18.0
          npm --version

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependency advisories and registry signatures
        run: |
          npm audit --audit-level=low
          npm audit --omit=dev --audit-level=low
          npm audit signatures

      - name: Install Chromium for non-live browser checks
        run: npm exec --no -- playwright install --with-deps chromium

      - name: Validate the public release surface
        run: npm run release:check
