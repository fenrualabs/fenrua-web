name: Site integrity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate public surface
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up exact release Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependency advisories and registry signatures
        run: |
          npm audit --audit-level=low
          npm audit --omit=dev --audit-level=low
          npm audit signatures

      - name: Install Chromium for non-live browser checks
        run: npm exec --no -- playwright install --with-deps chromium

      - name: Validate the public release surface
        run: npm run release:check
