name: Legacy public release sentinel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Legacy public release gate moved to private ops
    runs-on: ubuntu-latest
    steps:
      - name: Refuse public-repo release gate
        run: |
          echo "::error::This public release gate is legacy and retired."
          echo "::error::All production publishing now runs through SAM/Owner private operations control."
          exit 1
