name: Retired public release gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Direct public release gate retired
    runs-on: ubuntu-latest
    steps:
      - name: Refuse public-repo release gate
        run: |
          echo "::error::The public repository release gate is retired."
          echo "::error::All production publishing now follows the Owner-approved Git-integrated release sequence."
          exit 1
