name: SAE Release Gate

on:
  workflow_dispatch:
    inputs:
      expected_main_sha:
        description: "Exact approved main commit SHA to publish"
        required: true
        type: string
      confirmation:
        description: "Type SAE_APPROVES_PRODUCTION_RELEASE"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sae-release-gate-production
  cancel-in-progress: false

jobs:
  sae-release-gate:
    name: SAE release gate
    runs-on: ubuntu-latest
    timeout-minutes: 75
    if: github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      CANONICAL_URL: https://fenrua.ai

    steps:
      - name: Verify SAE publication confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirmation }}" != "SAE_APPROVES_PRODUCTION_RELEASE" ]; then
            echo "::error::SAE publication confirmation did not match the required phrase."
            exit 1
          fi

      - name: Checkout approved main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify exact main commit and production secrets
        id: release
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ inputs.expected_main_sha }}"
          if ! [[ "$expected" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::expected_main_sha must be a 40-character lowercase commit SHA."
            exit 1
          fi
          actual="$(git rev-parse HEAD)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Workflow checkout commit $actual does not match approved main commit $expected."
            exit 1
          fi
          if [ -n "$(git status --porcelain=v1)" ]; then
            echo "::error::SAE release gate requires a clean source checkout before publishing."
            git status --porcelain=v1
            exit 1
          fi
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured."
              exit 1
            fi
          done
          echo "main_sha=$actual" >> "$GITHUB_OUTPUT"
          echo "Approved main commit: $actual"

      - name: Set up exact release Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install pinned publishing tooling
        shell: bash
        run: npm install --global npm@11.18.0 vercel@55.0.0

      - name: Install locked dependencies
        run: npm ci

      - name: Validate public release artifact set
        run: npm run build:release

      - name: Capture release manifest digest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          record_sha="$(node -p "require('./.well-known/fenrua-release.json').integrity.recordSha256")"
          echo "record_sha=$record_sha" >> "$GITHUB_OUTPUT"
          echo "Release record SHA-256: $record_sha"

      - name: Pull Vercel production configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production deployment
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/vercel-deploy.log"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tee "$log"
          deployment_url="$(grep -Eo 'https://[^[:space:]]+' "$log" | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "::error::Unable to capture Vercel deployment URL."
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $deployment_url"

      - name: Audit live production surface
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            if npm run audit:live-release -- --url "$CANONICAL_URL" --expected-commit "${{ steps.release.outputs.main_sha }}" --expected-record-sha256 "${{ steps.manifest.outputs.record_sha }}"; then
              echo "Live production audit succeeded."
              exit 0
            fi
            echo "Live production audit not yet matched; retry $attempt/20."
            sleep 30
          done
          echo "::error::Live production audit did not confirm the merged release."
          exit 1

      - name: Confirm clean release handoff
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain=v1)" ]; then
            echo "::error::Release checkout is dirty after deployment."
            git status --porcelain=v1
            exit 1
          fi
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## SAE release gate complete

          - Main commit: ${{ steps.release.outputs.main_sha }}
          - Production deployment: ${{ steps.deploy.outputs.deployment_url }}
          - Live domain: $CANONICAL_URL
          - Tree: clean
          EOF
