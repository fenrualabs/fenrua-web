name: Retired SAE release gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: SAE release gate moved to private ops
    runs-on: ubuntu-latest
    steps:
      - name: Refuse public-repo release gate
        run: |
          echo "::error::The public repository SAE release gate is retired."
          echo "::error::All production publishing now runs through SAE-owned private operations control."
          exit 1
