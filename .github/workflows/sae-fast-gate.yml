name: Public release boundary gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sae-fast-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-release-boundary-gate:
    name: Public release boundary gate
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify public repo has no production deployment authority
        shell: bash
        run: |
          set -euo pipefail

          echo "Public release boundary gate: enforcing private deployment authority."

          if grep -RInE --exclude='sae-fast-gate.yml' 'VERCEL_(TOKEN|ORG_ID|PROJECT_ID)|vercel[[:space:]]+(pull|build|deploy)|vercel@[0-9]' .github 2>/dev/null; then
            echo "::error::Public workflows contain forbidden production deployment wiring."
            exit 1
          fi

          if grep -RInE --exclude='test-*.mjs' 'vercel[[:space:]]+(pull|build|deploy)|vercel@[0-9]' scripts 2>/dev/null; then
            echo "::error::Public runtime scripts contain forbidden Vercel CLI deployment wiring."
            exit 1
          fi

          test ! -e .vercel/project.json || { echo "::error::.vercel project state is forbidden in the public repository"; exit 1; }

          for f in .github/workflows/deploy-production.yml .github/workflows/sae-release-gate.yml; do
            test -f "$f" || { echo "::error::$f missing"; exit 1; }
            grep -q "exit 1" "$f" || { echo "::error::$f must fail closed"; exit 1; }
            grep -q "private operations" "$f" || { echo "::error::$f must redirect to private operations"; exit 1; }
          done

          grep -q "Owner-approved private-control-plane publication rule" docs/SAFE_WEBSITE_PUBLISHING.md
          grep -q "Repository-Wide Owner-Approved Release Rule" AGENTS.md
          grep -qi "Owner-approved release workflow" docs/OWNER_APPROVED_RELEASE_WORKFLOW.md
          grep -q "Vercel Publishing Boundary" docs/VERCEL.md

          echo "Public release boundary gate passed."
